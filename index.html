<!doctype html>

  <!-- Google Fonts (免費 CDN) -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <!-- 引入你自己的 CSS 檔案 -->
  <link rel="stylesheet" href="https://unpkg.com/98.css">
  <link rel="stylesheet" href="style.css" />


</head>
<body>
  

    <!-- 新增：桌面圖示區塊，固定於左側 -->

    <div class="desktop-icon" onclick="openWindow('MainWindow')">
      <img src="assets/Lizzz.png" alt="">
      <span>Lizzz</span>
    </div>
    <div class="desktop-icon" onclick="openWindow('window3')">
      <img src="assets/computer2.png" alt="">

    </div>
    <div class="desktop-icon" onclick="openWindow('window5')">

    </div>
    <div class="desktop-icon" onclick="openWindow('window7'); openWindow('window2')">
      <img src="assets/media2.png" alt="">
      <span>Media</span>
    </div>
    <div class="desktop-icon" onclick="openWindow('window8')">
      <img src="assets/media.png" alt="">

    <div class="desktop-icon" onclick="openWindow('window4')">

      <span class="window-body">

        <span class="nav_search_bar">

        </span>
      </div>  

      <div class="content">
         <iframe src="cover/cover.html" id="frame1"></iframe>

      </div>
    

      <div class="button_row">
        <button class="icon_btn" type="button" onclick="setMainPage('cover/cover.html')">
          <img src="assets/home.png" alt="">
          <span class="btn_text">HomePage</span>
        </button>

        <button class="icon_btn" type="button" onclick="setMainPage('cover/aboutme.html')">

      </div>
       </span>
       
    </div>

        <div class="title-bar-text">love</div>
        <div class="title-bar-controls">

        </div>
      </div>

      <div class="window-body">
        <img src="https://i.pinimg.com/originals/55/6c/0a/556c0ae630b46f476da70f0f0284ba0f.gif" alt="">

    </div>
